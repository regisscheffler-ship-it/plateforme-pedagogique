{% extends 'core/base.html' %}
{% block title %}Créer un dossier - {{ atelier.titre }}{% endblock %}

{% block content %}
<style>
    .page-container {
        max-width: 1600px;
        width: 100%;
        margin: 0 auto;
        padding: 2rem;
    }

    /* ─── HEADER ─────────────────────────────── */
    .page-header {
        background: white;
        border-radius: 16px;
        padding: 2rem 2.5rem;
        margin-bottom: 2rem;
        box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        border-left: 5px solid #e8922a;
    }

    .page-header h1 {
        margin: 0;
        color: #2c3e50;
        font-size: 1.8rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 0.8rem;
    }

    .page-header .subtitle {
        margin: 0.3rem 0 0 3rem;
        color: #6c757d;
        font-size: 0.9rem;
    }

    .btn-retour {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.7rem 1.5rem;
        background: white;
        color: #e8922a;
        border: 2px solid #e8922a;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s;
        white-space: nowrap;
    }

    .btn-retour:hover {
        background: #e8922a;
        color: white;
        transform: translateY(-2px);
    }

    .btn-retour svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        stroke-width: 2.5;
        fill: none;
    }

    /* ─── FORMULAIRE ─────────────────────────── */
    .form-card {
        background: white;
        border-radius: 16px;
        padding: 2.5rem;
        box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
    }

    @media (max-width: 768px) {
        .form-row { grid-template-columns: 1fr; }
        .page-container { padding: 1rem; }
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: #2c3e50;
        font-size: 0.95rem;
    }

    .form-group label .required {
        color: #dc3545;
        margin-left: 3px;
    }

    .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 2px solid #e9ecef;
        border-radius: 10px;
        font-size: 1rem;
        transition: all 0.3s;
        box-sizing: border-box;
        font-family: inherit;
    }

    .form-control:focus {
        outline: none;
        border-color: #e8922a;
        box-shadow: 0 0 0 3px rgba(232, 146, 42, 0.1);
    }

    textarea.form-control {
        resize: vertical;
        min-height: 120px;
    }

    .form-check {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        padding: 1rem 1.2rem;
        background: #f8f9fa;
        border-radius: 10px;
        border: 2px solid #e9ecef;
        cursor: pointer;
        transition: all 0.3s;
    }

    .form-check:hover {
        border-color: #e8922a;
        background: #fff9f0;
    }

    .form-check input[type="checkbox"] {
        width: 20px;
        height: 20px;
        cursor: pointer;
        accent-color: #e8922a;
    }

    .form-check label {
        margin: 0;
        cursor: pointer;
        font-weight: 600;
        color: #2c3e50;
    }

    .form-actions {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
        padding-top: 2rem;
        border-top: 2px solid #e9ecef;
    }

    .btn-submit {
        flex: 1;
        padding: 0.9rem 2rem;
        background: white;
        color: #e8922a;
        border: 2px solid #e8922a;
        border-radius: 10px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
    }

    .btn-submit:hover {
        background: #e8922a;
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(232, 146, 42, 0.3);
    }

    .btn-cancel {
        padding: 0.9rem 2rem;
        background: white;
        color: #6c757d;
        border: 2px solid #dee2e6;
        border-radius: 10px;
        font-weight: 600;
        font-size: 1rem;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        transition: all 0.3s;
    }

    .btn-cancel:hover {
        background: #f8f9fa;
        border-color: #adb5bd;
        color: #495057;
    }
</style>

<div class="page-container">

    <a href="{% url 'core:atelier_detail' atelier.id %}" class="btn-retour">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Retour
    </a>

    <div class="page-header">
        <div>
            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                Créer un dossier
            </h1>
            <p class="subtitle">{{ atelier.titre }}</p>
        </div>
    </div>

    <div class="form-card">
        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Nom du dossier <span class="required">*</span></label>
                <input type="text" name="nom" class="form-control" required placeholder="Ex: Tutoriels, Consignes, Fiches techniques...">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" class="form-control" placeholder="Description optionnelle du dossier"></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Ordre d'affichage</label>
                    <input type="number" name="ordre" class="form-control" value="0" min="0">
                </div>
                <div class="form-group" style="display:flex;align-items:flex-end;">
                    <div class="form-check" style="width:100%;">
                        <input type="checkbox" name="visible_eleves" id="visible_eleves" checked>
                        <label for="visible_eleves">Visible par les élèves</label>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <a href="{% url 'core:atelier_detail' atelier.id %}" class="btn-cancel">Annuler</a>
                <button type="submit" class="btn-submit">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line></svg>
                    Créer le dossier
                </button>
            </div>
        </form>
    </div>

</div>

{% endblock %}
