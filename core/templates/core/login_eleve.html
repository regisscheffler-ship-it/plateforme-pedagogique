{% extends 'core/base.html' %}

{% block title %}Connexion Élève - Lycée Louis Loucheur{% endblock %}

{% block content %}
<style>
    body {
        background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
    }

    /* --- MOBILE D'ABORD (max-width 500px) --- */
    .login-container {
        max-width: 500px;
        margin: 3rem auto;
        padding: 0 1rem;
        transition: max-width 0.3s ease;
    }

    .login-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .login-header img {
        max-width: 100px;
        margin-bottom: 1.5rem;
        filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
    }

    .login-header h1 {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        font-size: 2rem;
        color: #20c997;
        font-weight: 600;
        margin-bottom: 0.5rem;
    }

    .login-header h1 svg {
        width: 28px;
        height: 28px;
        fill: #20c997;
    }

    .login-header p {
        font-size: 0.95rem;
        color: #6c757d;
        margin: 0;
    }

    /* Carte de formulaire */
    .login-card {
        background: white;
        border: 2px solid #e9ecef;
        border-radius: 16px;
        padding: 2.5rem 2rem;
        box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    /* Groupes de champs */
    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        font-weight: 600;
        color: #2c3e50;
        margin-bottom: 0.5rem;
        font-size: 0.95rem;
    }

    .form-group input {
        width: 100%;
        padding: 0.85rem 1rem;
        border: 2px solid #e9ecef;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s;
        box-sizing: border-box;
    }

    .form-group input:focus {
        outline: none;
        border-color: #20c997;
        background: #f0fdf8;
    }

    .form-group input::placeholder {
        color: #adb5bd;
    }

    /* Bouton de connexion */
    .btn-connexion {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, #20c997 0%, #1aa179 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        box-shadow: 0 4px 12px rgba(32, 201, 151, 0.3);
    }

    .btn-connexion:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(32, 201, 151, 0.4);
    }

    .btn-connexion svg {
        width: 20px;
        height: 20px;
        fill: white;
    }

    /* Section inscription */
    .inscription-section {
        text-align: center;
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid #e9ecef;
    }

    .inscription-section p {
        color: #6c757d;
        margin-bottom: 0.8rem;
        font-size: 0.95rem;
    }

    .inscription-section a {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
        padding: 0.6rem 1.2rem;
        border: 2px solid #667eea;
        border-radius: 8px;
        transition: all 0.3s;
    }

    .inscription-section a:hover {
        background: #667eea;
        color: white;
    }

    .inscription-section a svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
    }

    /* Lien retour */
    .retour-link {
        text-align: center;
        margin-top: 2rem;
    }

    .retour-link a {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        transition: all 0.3s;
    }

    .retour-link a:hover {
        color: #764ba2;
        gap: 0.8rem;
    }

    .retour-link svg {
        width: 20px;
        height: 20px;
        stroke: currentColor;
    }

    /* --- C'EST ICI QUE CA CHANGE POUR LE PC --- */
    @media (min-width: 992px) {
        .login-container {
            max-width: 900px; /* BEAUCOUP PLUS LARGE */
            margin: 5rem auto;
        }

        .login-card {
            padding: 4rem 5rem;
        }

        .login-header img {
            max-width: 150px;
        }

        .login-header h1 {
            font-size: 2.8rem;
            margin-bottom: 1rem;
        }

        .login-header h1 svg {
            width: 38px;
            height: 38px;
        }

        .login-header p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }

        .form-group label {
            font-size: 1.15rem;
        }

        .form-group input {
            padding: 1.2rem 1.5rem;
            font-size: 1.2rem;
            border-radius: 10px;
        }

        .btn-connexion {
            padding: 1.3rem;
            font-size: 1.3rem;
            border-radius: 10px;
        }

        .btn-connexion svg {
            width: 26px;
            height: 26px;
        }

        .inscription-section {
            margin-top: 3rem;
            padding-top: 2rem;
        }

        .inscription-section p {
            font-size: 1.1rem;
        }

        .inscription-section a {
            padding: 0.8rem 1.6rem;
            font-size: 1.1rem;
        }
    }
</style>

<!-- En-tête -->
<div class="login-container">
    <div class="login-header">
        <img src="https://lp-louis-loucheur-roubaix.59.ac-lille.fr/wp-content/uploads/sites/17/2019/11/logoL_LOUCHEUR-300x300.jpg" 
             alt="Logo Lycée Louis Loucheur">
        
        <h1>
            <svg viewBox="0 0 24 24">
                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="8.5" cy="7" r="4"/>
            </svg>
            Connexion Élève
        </h1>
        <p>Accédez à vos cours et ressources</p>
    </div>

    <!-- Carte Formulaire -->
    <div class="login-card">
        <form method="POST">
            {% csrf_token %}
            
            <!-- Identifiant -->
            <div class="form-group">
                <label for="username">Identifiant</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Votre identifiant" 
                    required
                    autocomplete="username"
                >
            </div>

            <!-- Mot de passe -->
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Votre mot de passe" 
                    required
                    autocomplete="current-password"
                >
            </div>

            <!-- Bouton -->
            <button type="submit" class="btn-connexion">
                <svg viewBox="0 0 24 24">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13.8 12H3"/>
                </svg>
                Se connecter
            </button>
        </form>

        <!-- Section inscription -->
        <div class="inscription-section">
            <p>Pas encore de compte ?</p>
            <a href="{% url 'core:inscription_eleve' %}">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="8.5" cy="7" r="4"/>
                    <line x1="20" y1="8" x2="20" y2="14"/>
                    <line x1="23" y1="11" x2="17" y2="11"/>
                </svg>
                S'inscrire maintenant
            </a>
        </div>
    </div>

    <!-- Retour -->
    <div class="retour-link">
        <a href="{% url 'core:choix_eleve' %}">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Retour
        </a>
    </div>
</div>

{% endblock %}
