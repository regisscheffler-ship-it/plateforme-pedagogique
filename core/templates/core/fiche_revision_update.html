{% extends 'core/base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Modifier la fiche de révision</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="titre" class="form-label">Titre</label>
            <input type="text" class="form-control" id="titre" name="titre" value="{{ fiche.titre }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a href="{% url 'core:fiche_revision_detail' fiche.id %}" class="btn btn-secondary">Annuler</a>
    </form>
</div>
{% endblock %}
