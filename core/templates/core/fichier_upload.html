{% extends 'core/base.html' %}
{% block title %}Ajouter une ressource{% endblock %}

{% block content %}
<style>
    .container-fluid-custom { max-width: 1400px; margin: 0 auto; padding: 2rem; }

    .btn-back {
        display: inline-flex; align-items: center; gap: 0.5rem;
        padding: 0.6rem 1.2rem; border: 2px solid #7c5cbf; border-radius: 8px;
        color: #7c5cbf; background: white; font-weight: 600; text-decoration: none;
        margin-bottom: 1.5rem; transition: all 0.2s ease; font-size: 0.9rem;
    }
    .btn-back:hover { background: #7c5cbf; color: white; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(124,92,191,0.25); }
    .btn-back svg { width: 18px; height: 18px; }

    .form-card {
        background: white; border-radius: 16px; padding: 2.5rem;
        box-shadow: 0 4px 16px rgba(0,0,0,0.06); border-left: 6px solid #7c5cbf;
    }

    .form-header { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 2px solid #f8f9fa; }
    .form-header-top { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.4rem; }
    .form-icon {
        width: 52px; height: 52px; background: #f5f3ff; color: #7c5cbf;
        border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .form-icon svg { width: 26px; height: 26px; stroke: #7c5cbf; fill: none; }
    .form-header h1 { margin: 0; color: #2c3e50; font-size: 1.7rem; font-weight: 700; }
    .form-header p { color: #6c757d; font-size: 0.95rem; margin: 0.3rem 0 0 4.2rem; }
    .form-header p strong { color: #7c5cbf; }

    /* TYPE SELECTOR */
    .type-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
    .type-option input { display: none; }
    .type-option label {
        display: flex; flex-direction: column; align-items: center; gap: 0.8rem; padding: 1.4rem;
        background: white; border: 2px solid #e9ecef; border-radius: 12px; cursor: pointer;
        text-align: center; transition: all 0.2s;
    }
    .type-option label svg { width: 28px; height: 28px; stroke: #adb5bd; fill: none; transition: stroke 0.2s; }
    .type-option label span { font-weight: 600; color: #6c757d; font-size: 0.9rem; transition: color 0.2s; }
    .type-option input:checked + label {
        background: #f5f3ff; border-color: #7c5cbf; transform: translateY(-3px);
        box-shadow: 0 4px 12px rgba(124,92,191,0.15);
    }
    .type-option input:checked + label svg { stroke: #7c5cbf; }
    .type-option input:checked + label span { color: #7c5cbf; }

    /* GRILLE 2 colonnes */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }

    .form-group { margin-bottom: 1.5rem; }
    .form-label {
        display: flex; align-items: center; gap: 0.5rem;
        font-weight: 600; color: #2c3e50; font-size: 0.9rem; margin-bottom: 0.5rem;
    }
    .form-label svg { width: 15px; height: 15px; stroke: #7c5cbf; fill: none; }
    .required { color: #d94f4f; }

    .form-control {
        width: 100%; padding: 0.8rem 1rem; border: 2px solid #e9ecef;
        border-radius: 10px; font-size: 0.95rem; color: #2c3e50;
        font-family: inherit; transition: all 0.2s; background: white; box-sizing: border-box;
    }
    .form-control:focus { outline: none; border-color: #7c5cbf; box-shadow: 0 0 0 3px rgba(124,92,191,0.1); }
    textarea.form-control { resize: vertical; min-height: 120px; }

    /* CHAMPS CONDITIONNELS */
    .conditional-field { display: none; }
    .conditional-field.active { display: block; animation: fadeIn 0.3s; }

    /* ZONE UPLOAD */
    .upload-zone {
        border: 2px dashed #d8cff5; border-radius: 12px; padding: 2rem;
        text-align: center; background: #faf8ff; margin-top: 0.5rem; transition: all 0.2s;
    }
    .upload-zone:hover { border-color: #7c5cbf; background: #f5f3ff; }
    .upload-zone svg { width: 36px; height: 36px; stroke: #7c5cbf; fill: none; margin-bottom: 0.8rem; }
    .upload-zone small { color: #6c757d; display: block; margin-top: 0.5rem; font-size: 0.83rem; }

    /* ACTIONS */
    .form-actions { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #e9ecef; }
    .btn-submit {
        display: inline-flex; align-items: center; gap: 0.6rem;
        padding: 0.85rem 2rem; background: #7c5cbf; color: white;
        border: 2px solid #7c5cbf; border-radius: 10px; font-size: 1rem; font-weight: 700;
        cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .btn-submit:hover { background: #6a4daa; border-color: #6a4daa; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(124,92,191,0.3); }
    .btn-submit svg { width: 18px; height: 18px; fill: none; }
    .btn-cancel {
        display: inline-flex; align-items: center; gap: 0.5rem;
        padding: 0.85rem 1.6rem; background: white; color: #6c757d;
        border: 2px solid #dee2e6; border-radius: 10px; font-weight: 600;
        font-size: 0.95rem; text-decoration: none; transition: all 0.2s;
    }
    .btn-cancel:hover { background: #f8f9fa; border-color: #adb5bd; transform: translateY(-2px); }
    .btn-cancel svg { width: 18px; height: 18px; fill: none; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 992px) { .form-grid { grid-template-columns: 1fr; } .type-selector { grid-template-columns: 1fr; } }
</style>

<div class="container-fluid-custom">

    <a href="#" class="btn-back btn-back-universal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Retour
    </a>

    <div class="form-card">

        <div class="form-header">
            <div class="form-header-top">
                <div class="form-icon">
                    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                </div>
                <h1>Ajouter une ressource</h1>
            </div>
            <p>Dans le dossier : <strong>{{ dossier.nom }}</strong></p>
        </div>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- SÉLECTEUR DE TYPE -->
            <div class="type-selector">
                <div class="type-option">
                    <input type="radio" name="type_contenu" id="tc1" value="fichier" checked>
                    <label for="tc1">
                        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                        <span>Fichier</span>
                    </label>
                </div>
                <div class="type-option">
                    <input type="radio" name="type_contenu" id="tc2" value="lien">
                    <label for="tc2">
                        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                        <span>Lien externe</span>
                    </label>
                </div>
                <div class="type-option">
                    <input type="radio" name="type_contenu" id="tc3" value="iframe">
                    <label for="tc3">
                        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline></svg>
                        <span>Vidéo / Intégration</span>
                    </label>
                </div>
            </div>

            <!-- GRILLE 2 COLONNES -->
            <div class="form-grid">

                <!-- COLONNE GAUCHE -->
                <div>
                    <div class="form-group">
                        <label class="form-label" for="nom">
                            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                            Nom de la ressource <span class="required">*</span>
                        </label>
                        <input type="text" id="nom" name="nom" class="form-control"
                               placeholder="Ex : Cours chapitre 1" required autofocus>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="description">
                            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="17" y1="10" x2="3" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="17" y1="18" x2="3" y2="18"></line></svg>
                            Description <span style="color:#adb5bd;font-weight:400;">(optionnel)</span>
                        </label>
                        <textarea id="description" name="description" class="form-control"
                                  placeholder="Description de la ressource..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="ordre">
                            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                            Ordre d'affichage
                        </label>
                        <input type="number" id="ordre" name="ordre" class="form-control" value="0" style="width:160px;">
                    </div>
                </div>

                <!-- COLONNE DROITE -->
                <div>
                    <!-- 1. FICHIER -->
                    <div id="field-fichier" class="conditional-field active">
                        <div class="form-group">
                            <label class="form-label">
                                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                                Fichier à uploader <span class="required">*</span>
                            </label>
                            <div class="upload-zone">
                                <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                                <input type="file" name="fichier" class="form-control">
                                <small>PDF, Word, Excel, Images...</small>
                            </div>
                        </div>
                    </div>

                    <!-- 2. LIEN -->
                    <div id="field-lien" class="conditional-field">
                        <div class="form-group">
                            <label class="form-label">
                                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                                URL du lien <span class="required">*</span>
                            </label>
                            <input type="url" name="lien_externe" class="form-control"
                                   placeholder="https://www.exemple.com">
                        </div>
                    </div>

                    <!-- 3. IFRAME -->
                    <div id="field-iframe" class="conditional-field">
                        <div class="form-group">
                            <label class="form-label">
                                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline></svg>
                                Code d'intégration (Embed) <span class="required">*</span>
                            </label>
                            <textarea name="code_iframe" class="form-control" rows="6"
                                      placeholder="<iframe src='...'></iframe>"></textarea>
                            <small style="color:#6c757d;font-size:0.82rem;margin-top:0.4rem;display:block;">
                                Copiez ici le code fourni par YouTube, Genially, etc.
                            </small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- BOUTONS -->
            <div class="form-actions">
                <a href="#" class="btn-cancel btn-back-universal">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                    Annuler
                </a>
                <button type="submit" class="btn-submit">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                    Ajouter la ressource
                </button>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const radios = document.querySelectorAll('input[name="type_contenu"]');
    radios.forEach(radio => {
        radio.addEventListener('change', function() {
            document.getElementById('field-fichier').classList.remove('active');
            document.getElementById('field-lien').classList.remove('active');
            document.getElementById('field-iframe').classList.remove('active');
            if(this.value === 'fichier') document.getElementById('field-fichier').classList.add('active');
            if(this.value === 'lien') document.getElementById('field-lien').classList.add('active');
            if(this.value === 'iframe') document.getElementById('field-iframe').classList.add('active');
        });
    });
});
</script>
{% endblock %}
