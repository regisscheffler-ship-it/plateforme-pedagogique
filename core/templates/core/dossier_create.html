
{% extends 'core/base.html' %}

{% block content %}
<style>
    .dc-container { max-width: 1600px; width: 100%; margin: 0 auto; padding: 2rem; }
    .dc-card {
        background: white; border-radius: 16px; padding: 3rem;
        box-shadow: 0 8px 30px rgba(0,0,0,0.06); border: 1px solid #f0f2f5;
        max-width: 700px; margin: 0 auto;
    }
    .dc-header { display: flex; align-items: center; gap: 1.2rem; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 2px solid #f8f9fa; }
    .dc-header-icon { width: 52px; height: 52px; background: linear-gradient(135deg, #f5f3ff 0%, #e8d8ff 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #7c5cbf; }
    .dc-header-icon svg { width: 26px; height: 26px; stroke: #7c5cbf; stroke-width: 2; fill: none; }
    .dc-header h1 { margin: 0; color: #2c3e50; font-size: 1.8rem; font-weight: 700; }
    .dc-header p { margin: 0.3rem 0 0 0; color: #6c757d; font-size: 0.95rem; }
    .dc-form-group { margin-bottom: 1.8rem; }
    .dc-form-group label { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem; font-weight: 600; color: #34495e; }
    .dc-form-group label svg { width: 18px; height: 18px; stroke: #7c5cbf; stroke-width: 2; fill: none; }
    .dc-form-group input, .dc-form-group textarea {
        width: 100%; padding: 0.9rem 1rem; border: 2px solid #e9ecef; border-radius: 10px;
        font-size: 1rem; transition: all 0.2s; background: #fdfdfd; box-sizing: border-box;
    }
    .dc-form-group input:focus, .dc-form-group textarea:focus {
        border-color: #7c5cbf; outline: none; background: #fff; box-shadow: 0 0 0 4px rgba(124,92,191,0.1);
    }
    .dc-checkbox { display: flex; align-items: flex-start; gap: 1rem; background: #f8f9fa; padding: 1.2rem; border-radius: 12px; border: 1px solid #e9ecef; cursor: pointer; }
    .dc-checkbox input { width: 20px; height: 20px; accent-color: #7c5cbf; cursor: pointer; margin-top: 2px; flex-shrink: 0; }
    .dc-checkbox-label { font-weight: 600; color: #2c3e50; }
    .dc-checkbox-hint { font-size: 0.85rem; color: #6c757d; font-weight: 400; }
    .dc-actions { display: flex; gap: 1rem; margin-top: 2.5rem; padding-top: 2rem; border-top: 2px solid #f8f9fa; justify-content: flex-end; }
    .btn-dc-submit {
        display: inline-flex; align-items: center; gap: 0.5rem;
        padding: 0.9rem 1.8rem; background: white; color: #7c5cbf;
        border: 2px solid #7c5cbf; border-radius: 10px; font-weight: 700; font-size: 1rem;
        cursor: pointer; transition: all 0.2s; text-decoration: none;
    }
    .btn-dc-submit:hover { background: #7c5cbf; color: white; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(124,92,191,0.3); }
    .btn-dc-submit svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2.5; fill: none; }
    .btn-dc-cancel {
        display: inline-flex; align-items: center; gap: 0.5rem;
        padding: 0.9rem 1.8rem; background: white; color: #6c757d;
        border: 2px solid #dee2e6; border-radius: 10px; font-weight: 600; font-size: 1rem;
        text-decoration: none; transition: all 0.2s;
    }
    .btn-dc-cancel:hover { background: #f8f9fa; border-color: #adb5bd; }
    .btn-dc-cancel svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2.5; fill: none; }
</style>

<div class="dc-container">

    <!-- BOUTON RETOUR -->
    <a href="#" class="btn-back-universal"
       style="display:inline-flex;align-items:center;gap:0.5rem;
              padding:0.6rem 1.2rem;background:white;color:#7c5cbf;
              border:2px solid #7c5cbf;border-radius:8px;
              text-decoration:none;font-weight:600;font-size:0.9rem;
              transition:all 0.3s ease;margin-bottom:1.5rem;">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Retour
    </a>

    <div class="dc-card">
        <div class="dc-header">
            <div class="dc-header-icon">
                <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    <line x1="12" y1="11" x2="12" y2="17"></line>
                    <line x1="9" y1="14" x2="15" y2="14"></line>
                </svg>
            </div>
            <div>
                <h1>Créer un dossier</h1>
                <p>Thème : <strong>{{ theme.nom }}</strong></p>
            </div>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="dc-form-group">
                <label for="nom">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                    Nom du dossier <span style="color:#dc3545;">*</span>
                </label>
                <input type="text" id="nom" name="nom" required
                       placeholder="Ex: Vocabulaire, Exercices, Documents...">
            </div>

            <div class="dc-form-group">
                <label for="description">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="8" y1="6" x2="21" y2="6"></line>
                        <line x1="8" y1="12" x2="21" y2="12"></line>
                        <line x1="8" y1="18" x2="21" y2="18"></line>
                        <line x1="3" y1="6" x2="3.01" y2="6"></line>
                        <line x1="3" y1="12" x2="3.01" y2="12"></line>
                        <line x1="3" y1="18" x2="3.01" y2="18"></line>
                    </svg>
                    Description
                </label>
                <textarea id="description" name="description" rows="4"
                          placeholder="Description du contenu de ce dossier..."></textarea>
            </div>

            <div class="dc-form-group">
                <label for="ordre">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="8" y1="6" x2="21" y2="6"></line>
                        <line x1="8" y1="12" x2="21" y2="12"></line>
                        <line x1="8" y1="18" x2="21" y2="18"></line>
                    </svg>
                    Ordre d'affichage
                </label>
                <input type="number" id="ordre" name="ordre" value="0" min="0" style="max-width:150px;">
                <small style="display:block;color:#6c757d;margin-top:0.4rem;">Plus le nombre est petit, plus le dossier apparaît en premier</small>
            </div>

            <div class="dc-checkbox">
                <input type="checkbox" id="visible_eleves" name="visible_eleves">
                <div>
                    <div class="dc-checkbox-label">Rendre visible aux élèves immédiatement</div>
                    <div class="dc-checkbox-hint">Vous pourrez changer la visibilité plus tard</div>
                </div>
            </div>

            <div class="dc-actions">
                <a href="{% url 'core:theme_detail' theme.id %}" class="btn-dc-cancel">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                    Annuler
                </a>
                <button type="submit" class="btn-dc-submit">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Créer le dossier
                </button>
            </div>
        </form>
    </div>

</div>
{% endblock %}
